function getBookIndexFull() {
  return window.BOOK_INDEX_FULL || window.BOOK_INDEX || [];
}

const TIME_PERIODS = [
  { label: "All", min: 0, max: 9999 },
  { label: "Pre-1800", min: 0, max: 1799 },
  { label: "1800–1850", min: 1800, max: 1850 },
  { label: "1850–1900", min: 1851, max: 1900 },
  { label: "1900–1950", min: 1901, max: 1950 },
  { label: "Unknown", min: null, max: null },
];

const LENGTH_BUCKETS = [
  { label: "All", min: 0, max: Infinity },
  { label: "Short (<50)", min: 0, max: 49 },
  { label: "Medium (50–200)", min: 50, max: 200 },
  { label: "Long (>200)", min: 201, max: Infinity },
];

const STATUS_OPTIONS = ["All", "In Training", "Held Out", "Pre-loaded"];

function BookList({ navigateTo, onAnalysisComplete }) {
  const [search, setSearch] = useState("");
  const [selectedGenres, setSelectedGenres] = useState(new Set());
  const [timePeriod, setTimePeriod] = useState(TIME_PERIODS[0]);
  const [lengthBucket, setLengthBucket] = useState(LENGTH_BUCKETS[0]);
  const [statusFilter, setStatusFilter] = useState("All");
  const [sortBy, setSortBy] = useState("title");
  const [sortAsc, setSortAsc] = useState(true);
  const [genreDropdownOpen, setGenreDropdownOpen] = useState(false);
  const genreRef = useRef(null);

  const allBooks = useMemo(() => getBookIndexFull(), []);

  // Extract all unique genres for the multi-select
  const allGenres = useMemo(() => {
    const counts = {};
    allBooks.forEach(b => {
      (b.genres || []).forEach(g => { counts[g] = (counts[g] || 0) + 1; });
    });
    return Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 60)
      .map(([g, c]) => ({ genre: g, count: c }));
  }, [allBooks]);

  // Close genre dropdown on outside click
  useEffect(() => {
    const handler = (e) => {
      if (genreRef.current && !genreRef.current.contains(e.target)) setGenreDropdownOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  // Pre-loaded novel IDs
  const preloadedIds = useMemo(() => {
    const ids = new Set();
    NOVEL_IDS.forEach(id => { if (getNovelData(id)) ids.add(id); });
    return ids;
  }, []);

  // Filter books
  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return allBooks.filter(b => {
      // Search
      if (q && !b.title.toLowerCase().includes(q) && !b.author.toLowerCase().includes(q) && !String(b.id).includes(q)) return false;
      // Genre
      if (selectedGenres.size > 0) {
        const bookGenres = b.genres || [];
        if (!bookGenres.some(g => selectedGenres.has(g))) return false;
      }
      // Time period
      if (timePeriod.min === null) {
        if (b.year) return false; // "Unknown" = only books without year
      } else if (timePeriod.min !== 0 || timePeriod.max !== 9999) {
        if (!b.year || b.year < timePeriod.min || b.year > timePeriod.max) return false;
      }
      // Length
      if (b.chunks < lengthBucket.min || b.chunks > lengthBucket.max) return false;
      // Status
      if (statusFilter === "In Training" && !b.inTraining) return false;
      if (statusFilter === "Held Out" && b.inTraining) return false;
      if (statusFilter === "Pre-loaded" && !preloadedIds.has(b.id)) return false;
      return true;
    });
  }, [allBooks, search, selectedGenres, timePeriod, lengthBucket, statusFilter, preloadedIds]);

  // Sort
  const sorted = useMemo(() => {
    const s = [...filtered];
    s.sort((a, b) => {
      let cmp = 0;
      if (sortBy === "title") cmp = a.title.localeCompare(b.title);
      else if (sortBy === "author") cmp = a.author.localeCompare(b.author);
      else if (sortBy === "year") cmp = (a.year || 9999) - (b.year || 9999);
      else if (sortBy === "chunks") cmp = a.chunks - b.chunks;
      else if (sortBy === "id") cmp = a.id - b.id;
      return sortAsc ? cmp : -cmp;
    });
    return s;
  }, [filtered, sortBy, sortAsc]);

  // Paginate for performance
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 100;
  const pageBooks = sorted.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  const totalPages = Math.ceil(sorted.length / PAGE_SIZE);

  // Reset page when filters change
  useEffect(() => { setPage(0); }, [search, selectedGenres, timePeriod, lengthBucket, statusFilter, sortBy, sortAsc]);

  const handleSort = (col) => {
    if (sortBy === col) setSortAsc(!sortAsc);
    else { setSortBy(col); setSortAsc(true); }
  };

  const toggleGenre = (g) => {
    setSelectedGenres(prev => {
      const next = new Set(prev);
      if (next.has(g)) next.delete(g); else next.add(g);
      return next;
    });
  };

  const handleBookClick = (book) => {
    navigateTo({ view: "timeline", novelId: book.id });
  };

  // Build summary line
  const summaryParts = [];
  if (selectedGenres.size > 0) summaryParts.push([...selectedGenres].slice(0, 3).join(", ") + (selectedGenres.size > 3 ? ` +${selectedGenres.size - 3}` : ""));
  if (timePeriod.label !== "All") summaryParts.push(timePeriod.label);
  if (lengthBucket.label !== "All") summaryParts.push(lengthBucket.label);
  if (statusFilter !== "All") summaryParts.push(statusFilter);
  const summaryExtra = summaryParts.length > 0 ? ` · ${summaryParts.join(" · ")}` : "";

  const pillBtn = (label, active, onClick) => (
    <button onClick={onClick} style={{
      padding: "4px 10px", border: "1px solid rgba(255,255,255,0.08)",
      borderRadius: "12px", backgroundColor: active ? "rgba(124,138,160,0.2)" : "transparent",
      color: active ? "#c8cdd8" : "#5a6478", fontSize: "11px", cursor: "pointer",
      transition: "all 0.15s",
    }}>{label}</button>
  );

  const sortArrow = (col) => sortBy === col ? (sortAsc ? " ▲" : " ▼") : "";

  return (
    <div>
      {/* Upload section */}
      <AnalyzeUpload navigateTo={navigateTo} onAnalysisComplete={onAnalysisComplete} />

      {/* Summary line */}
      <div style={{ marginBottom: "16px", fontSize: "13px", color: "#7c8aa0" }}>
        Showing {sorted.length.toLocaleString()} of {allBooks.length.toLocaleString()} books{summaryExtra}
      </div>

      {/* Filter bar */}
      <div style={{
        display: "flex", flexWrap: "wrap", gap: "12px", alignItems: "center",
        marginBottom: "16px", padding: "12px 16px",
        backgroundColor: "rgba(255,255,255,0.02)", borderRadius: "8px",
        border: "1px solid rgba(255,255,255,0.04)",
      }}>
        {/* Search */}
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search title, author, or ID..."
          style={{
            padding: "6px 12px", width: "220px", border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: "6px", backgroundColor: "rgba(0,0,0,0.2)", color: "#c8cdd8",
            fontSize: "12px", outline: "none", fontFamily: "inherit",
          }}
        />

        {/* Genre multi-select */}
        <div ref={genreRef} style={{ position: "relative" }}>
          <button onClick={() => setGenreDropdownOpen(!genreDropdownOpen)} style={{
            padding: "6px 12px", border: "1px solid rgba(255,255,255,0.1)",
            borderRadius: "6px", backgroundColor: selectedGenres.size > 0 ? "rgba(124,138,160,0.15)" : "rgba(0,0,0,0.2)",
            color: selectedGenres.size > 0 ? "#c8cdd8" : "#5a6478", fontSize: "12px", cursor: "pointer",
          }}>
            {selectedGenres.size > 0 ? `Genres (${selectedGenres.size})` : "Genre ▾"}
          </button>
          {genreDropdownOpen && (
            <div style={{
              position: "absolute", top: "100%", left: 0, marginTop: "4px", zIndex: 100,
              width: "280px", maxHeight: "300px", overflowY: "auto",
              backgroundColor: "#1e2230", border: "1px solid rgba(255,255,255,0.1)",
              borderRadius: "8px", boxShadow: "0 8px 24px rgba(0,0,0,0.4)",
            }}>
              {selectedGenres.size > 0 && (
                <button onClick={() => setSelectedGenres(new Set())} style={{
                  width: "100%", padding: "6px 12px", border: "none", borderBottom: "1px solid rgba(255,255,255,0.06)",
                  backgroundColor: "transparent", color: "#7c8aa0", fontSize: "11px",
                  cursor: "pointer", textAlign: "left",
                }}>Clear all</button>
              )}
              {allGenres.map(({ genre, count }) => (
                <label key={genre} style={{
                  display: "flex", alignItems: "center", gap: "8px",
                  padding: "5px 12px", cursor: "pointer", fontSize: "11px",
                  color: selectedGenres.has(genre) ? "#c8cdd8" : "#7c8aa0",
                  backgroundColor: selectedGenres.has(genre) ? "rgba(124,138,160,0.1)" : "transparent",
                }}>
                  <input type="checkbox" checked={selectedGenres.has(genre)}
                    onChange={() => toggleGenre(genre)}
                    style={{ accentColor: "#7c8aa0" }} />
                  <span style={{ flex: 1 }}>{genre}</span>
                  <span style={{ color: "#3a4458", fontSize: "10px" }}>{count}</span>
                </label>
              ))}
            </div>
          )}
        </div>

        {/* Time period */}
        <div style={{ display: "flex", gap: "4px" }}>
          {TIME_PERIODS.map(tp => pillBtn(tp.label, timePeriod === tp, () => setTimePeriod(tp)))}
        </div>

        {/* Length */}
        <div style={{ display: "flex", gap: "4px" }}>
          {LENGTH_BUCKETS.map(lb => pillBtn(lb.label, lengthBucket === lb, () => setLengthBucket(lb)))}
        </div>

        {/* Status */}
        <div style={{ display: "flex", gap: "4px" }}>
          {STATUS_OPTIONS.map(s => pillBtn(s, statusFilter === s, () => setStatusFilter(s)))}
        </div>
      </div>

      {/* Table */}
      <div style={{
        border: "1px solid rgba(255,255,255,0.06)", borderRadius: "8px",
        overflow: "hidden",
      }}>
        {/* Header */}
        <div style={{
          display: "grid",
          gridTemplateColumns: "60px 1fr 1fr 70px 1fr 70px 80px",
          backgroundColor: "rgba(255,255,255,0.03)",
          borderBottom: "1px solid rgba(255,255,255,0.06)",
        }}>
          {[
            { col: "id", label: "ID" },
            { col: "title", label: "Title" },
            { col: "author", label: "Author" },
            { col: "year", label: "Year" },
            { col: null, label: "Genre" },
            { col: "chunks", label: "Chunks" },
            { col: null, label: "Status" },
          ].map(({ col, label }) => (
            <div key={label} onClick={col ? () => handleSort(col) : undefined} style={{
              padding: "10px 12px", fontSize: "11px", fontWeight: 600,
              color: sortBy === col ? "#c8cdd8" : "#5a6478",
              cursor: col ? "pointer" : "default",
              userSelect: "none", whiteSpace: "nowrap",
            }}>
              {label}{col ? sortArrow(col) : ""}
            </div>
          ))}
        </div>

        {/* Rows */}
        {pageBooks.map((book, i) => {
          const isPreloaded = preloadedIds.has(book.id);
          return (
            <div
              key={book.id}
              onClick={() => handleBookClick(book)}
              style={{
                display: "grid",
                gridTemplateColumns: "60px 1fr 1fr 70px 1fr 70px 80px",
                borderBottom: i < pageBooks.length - 1 ? "1px solid rgba(255,255,255,0.03)" : "none",
                cursor: "pointer",
                backgroundColor: i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)",
                transition: "background-color 0.1s",
              }}
              onMouseEnter={e => e.currentTarget.style.backgroundColor = "rgba(124,138,160,0.08)"}
              onMouseLeave={e => e.currentTarget.style.backgroundColor = i % 2 === 0 ? "transparent" : "rgba(255,255,255,0.01)"}
            >
              <div style={{ padding: "8px 12px", fontSize: "11px", color: "#3a4458" }}>
                {book.id}
              </div>
              <div style={{
                padding: "8px 12px", fontSize: "12px", color: "#c8cdd8",
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                fontFamily: "'Crimson Pro', Georgia, serif",
              }}>
                {book.title}
              </div>
              <div style={{
                padding: "8px 12px", fontSize: "11px", color: "#7c8aa0",
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
              }}>
                {book.author}
              </div>
              <div style={{ padding: "8px 12px", fontSize: "11px", color: "#5a6478" }}>
                {book.year || "—"}
              </div>
              <div style={{
                padding: "6px 12px", display: "flex", gap: "4px", flexWrap: "wrap",
                overflow: "hidden", maxHeight: "32px",
              }}>
                {(book.genres || []).slice(0, 3).map(g => (
                  <span key={g} style={{
                    padding: "2px 6px", borderRadius: "8px", fontSize: "10px",
                    backgroundColor: "rgba(124,138,160,0.1)", color: "#7c8aa0",
                    whiteSpace: "nowrap",
                  }}>{g}</span>
                ))}
              </div>
              <div style={{
                padding: "8px 12px", fontSize: "11px", color: "#5a6478", textAlign: "right",
              }}>
                {book.chunks.toLocaleString()}
              </div>
              <div style={{ padding: "8px 12px", fontSize: "10px" }}>
                {isPreloaded ? (
                  <span style={{ color: "#6bba75" }}>Pre-loaded</span>
                ) : book.inTraining ? (
                  <span style={{ color: "#5a6478" }}>Training</span>
                ) : (
                  <span style={{ color: "#7c8aa0" }}>Held out</span>
                )}
              </div>
            </div>
          );
        })}

        {sorted.length === 0 && (
          <div style={{ padding: "32px", textAlign: "center", color: "#3a4458", fontSize: "13px" }}>
            No books match the current filters.
          </div>
        )}
      </div>

      {/* Pagination */}
      {totalPages > 1 && (
        <div style={{
          display: "flex", justifyContent: "center", alignItems: "center",
          gap: "8px", marginTop: "16px",
        }}>
          <button onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0}
            style={{
              padding: "4px 12px", border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: "6px", backgroundColor: "transparent",
              color: page === 0 ? "#2a3040" : "#7c8aa0", fontSize: "12px", cursor: page === 0 ? "default" : "pointer",
            }}>Prev</button>
          <span style={{ fontSize: "12px", color: "#5a6478" }}>
            Page {page + 1} of {totalPages}
          </span>
          <button onClick={() => setPage(Math.min(totalPages - 1, page + 1))} disabled={page >= totalPages - 1}
            style={{
              padding: "4px 12px", border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: "6px", backgroundColor: "transparent",
              color: page >= totalPages - 1 ? "#2a3040" : "#7c8aa0", fontSize: "12px",
              cursor: page >= totalPages - 1 ? "default" : "pointer",
            }}>Next</button>
        </div>
      )}
    </div>
  );
}

// ── Novel Selector Combo Box ────────────────────────────────
function NovelSelector({ novelId, onSelect, loadedNovels, loadingNovelId, uploadedNovels }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState("");
  const ref = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  useEffect(() => {
    if (open && inputRef.current) inputRef.current.focus();
  }, [open]);

  const current = NOVELS[novelId] || (() => {
    // Check uploaded novels
    const uploaded = (uploadedNovels || []).find(u => u.id === novelId);
    if (uploaded) return { title: uploaded.title, author: uploaded.author };
    const idx = getBookIndex().find(b => b.id === novelId);
    return idx ? { title: idx.title, author: idx.author } : { title: `Book #${novelId}` };
  })();

  const bookIndex = useMemo(() => getBookIndex(), []);

  // Filter results
  const searchLower = search.toLowerCase().trim();
  const preloaded = useMemo(() => {
    const items = NOVEL_IDS.map(id => {
      const info = NOVELS[id];
      const nd = getNovelData(id);
      return { id, title: info.title, author: info.author, inTraining: nd?.inTraining, preloaded: true };
    });
    if (!searchLower) return items;
    return items.filter(b =>
      b.title.toLowerCase().includes(searchLower) ||
      b.author.toLowerCase().includes(searchLower) ||
      String(b.id).includes(searchLower)
    );
  }, [searchLower]);

  const serverResults = useMemo(() => {
    if (!searchLower || searchLower.length < 2) return [];
    const preloadedIds = new Set(NOVEL_IDS);
    return bookIndex
      .filter(b => !preloadedIds.has(b.id) && (
        b.title.toLowerCase().includes(searchLower) ||
        (b.author || "").toLowerCase().includes(searchLower) ||
        String(b.id).includes(searchLower)
      ))
      .slice(0, 50);
  }, [searchLower, bookIndex]);

  const inTrainingPre = preloaded.filter(b => b.inTraining);
  const heldOutPre = preloaded.filter(b => !b.inTraining);

  const sectionHeader = (label) => (
    <div style={{
      padding: "4px 14px", fontSize: "10px",
      fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
      color: "#4a5468", textTransform: "uppercase",
      letterSpacing: "1px", backgroundColor: "rgba(255,255,255,0.02)",
      borderBottom: "1px solid rgba(255,255,255,0.04)",
    }}>
      {label}
    </div>
  );

  const novelRow = (b, isServer = false) => {
    const isActive = b.id === novelId;
    const isLoading = b.id === loadingNovelId;
    return (
      <div key={b.id}
        onClick={() => { onSelect(b.id); if (!isServer) setOpen(false); }}
        style={{
          padding: "8px 14px", cursor: "pointer",
          backgroundColor: isActive ? "rgba(255,255,255,0.06)" : "transparent",
          borderBottom: "1px solid rgba(255,255,255,0.04)",
          transition: "background-color 0.1s",
          display: "flex", alignItems: "center", gap: "8px",
        }}
        onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.backgroundColor = "rgba(255,255,255,0.04)"; }}
        onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.backgroundColor = isActive ? "rgba(255,255,255,0.06)" : "transparent"; }}
      >
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            fontSize: "12px", color: isActive ? "#e8ecf4" : "#c8cdd8",
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
          }}>
            {b.title}
          </div>
          <div style={{
            fontSize: "11px", color: "#5a6478",
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
          }}>
            {b.author ? `${b.author} · ` : ""}#{b.id}{b.chunks ? ` · ${b.chunks.toLocaleString()} chunks` : ""}
          </div>
        </div>
        {isLoading ? (
          <span className="explain-pulse" style={{
            fontSize: "11px", color: "#7c8aa0",
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
          }}>{"\u25CF"}</span>
        ) : isServer ? (
          <span style={{
            fontSize: "11px", color: "#5a6478", flexShrink: 0,
          }}>{"\u2913"}</span>
        ) : b.isUpload ? (
          <span style={{
            fontSize: "10px", padding: "1px 6px", borderRadius: "3px",
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
            backgroundColor: "rgba(130,120,200,0.15)",
            color: "#9088cc",
            border: "1px solid rgba(130,120,200,0.25)",
            flexShrink: 0,
          }}>upload</span>
        ) : (
          <span style={{
            fontSize: "10px", padding: "1px 6px", borderRadius: "3px",
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
            backgroundColor: b.inTraining ? "rgba(109,186,109,0.15)" : "rgba(180,140,80,0.15)",
            color: b.inTraining ? "#6dba6d" : "#b48c50",
            border: b.inTraining ? "1px solid rgba(109,186,109,0.25)" : "1px solid rgba(180,140,80,0.25)",
            flexShrink: 0,
          }}>
            {b.inTraining ? "train" : "held out"}
          </span>
        )}
      </div>
    );
  };

  return (
    <div ref={ref} style={{ position: "relative", marginLeft: "auto" }}>
      <button
        onClick={() => { setOpen(!open); if (!open) setSearch(""); }}
        style={{
          padding: "5px 12px", borderRadius: "4px",
          border: "1px solid rgba(255,255,255,0.15)",
          backgroundColor: "rgba(255,255,255,0.04)",
          color: "#c8cdd8", fontSize: "12px", cursor: "pointer",
          display: "flex", alignItems: "center", gap: "8px",
          minWidth: "200px",
        }}
      >
        <span style={{ flex: 1, textAlign: "left" }}>{current?.title}</span>
        <span style={{ color: "#5a6478", fontSize: "11px" }}>{"\u25BC"}</span>
      </button>

      {open && (
        <div style={{
          position: "absolute", top: "100%", right: 0, marginTop: "4px",
          backgroundColor: "#1a1b24", border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: "6px", zIndex: 100, minWidth: "340px", width: "400px",
          boxShadow: "0 8px 24px rgba(0,0,0,0.5)",
          display: "flex", flexDirection: "column", maxHeight: "500px",
        }}>
          {/* Search input */}
          <div style={{
            padding: "8px 12px",
            borderBottom: "1px solid rgba(255,255,255,0.06)",
          }}>
            <input
              ref={inputRef}
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="Search 9,766 novels..."
              style={{
                width: "100%", padding: "6px 10px", borderRadius: "4px",
                border: "1px solid rgba(255,255,255,0.1)",
                backgroundColor: "rgba(255,255,255,0.04)",
                color: "#c8cdd8", fontSize: "12px",
                fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
                outline: "none",
              }}
              onFocus={(e) => e.currentTarget.style.borderColor = "rgba(255,255,255,0.2)"}
              onBlur={(e) => e.currentTarget.style.borderColor = "rgba(255,255,255,0.1)"}
            />
          </div>

          {/* Results */}
          <div style={{ overflowY: "auto", flex: 1 }}>
            {/* Uploaded novels */}
            {(uploadedNovels || []).length > 0 && sectionHeader("Your Uploads")}
            {(uploadedNovels || []).map(u => novelRow({
              id: u.id, title: u.title, author: u.author || "Your Upload",
              chunks: u.numChunks, inTraining: false, isUpload: true,
            }))}
            {inTrainingPre.length > 0 && sectionHeader("In Training")}
            {inTrainingPre.map(b => novelRow(b))}
            {heldOutPre.length > 0 && sectionHeader("Held Out")}
            {heldOutPre.map(b => novelRow(b))}
            {serverResults.length > 0 && sectionHeader(`Corpus · ${serverResults.length} matches`)}
            {serverResults.map(b => novelRow(b, true))}
            {searchLower.length >= 2 && serverResults.length === 0 && preloaded.length === 0 && (
              <div style={{
                padding: "16px", textAlign: "center", color: "#4a5468",
                fontSize: "12px", fontStyle: "italic",
              }}>
                No novels matching "{search}"
              </div>
            )}
            {searchLower.length === 1 && (
              <div style={{
                padding: "8px 14px", color: "#4a5468",
                fontSize: "12px", fontStyle: "italic",
              }}>
                Type 2+ characters to search full corpus
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function PAM10KDemo() {
  const [view, setView] = useState("timeline");
  const [novelId, setNovelId] = useState(768);
  const [explorerK, setExplorerK] = useState(100);
  const [focusClusterId, setFocusClusterId] = useState(null);
  const [fetchedNovels, setFetchedNovels] = useState({});
  const [loadingNovelId, setLoadingNovelId] = useState(null);
  const [serverError, setServerError] = useState(null);
  const [showInfo, setShowInfo] = useState(false);
  const [targetChunkPos, setTargetChunkPos] = useState(null);
  const [uploadedNovels, setUploadedNovels] = useState([]);

  const clearFocus = useCallback(() => setFocusClusterId(null), []);

  const handleAnalysisComplete = useCallback((data) => {
    setFetchedNovels(prev => ({ ...prev, [data.novelId]: data }));
    setUploadedNovels(prev => [...prev, {
      id: data.novelId,
      title: data.title,
      author: data.author,
      numChunks: data.numChunks,
    }]);
  }, []);

  // Track which novels have loaded data
  const loadedNovels = useMemo(() => {
    const loaded = new Set();
    NOVEL_IDS.forEach((id) => {
      if (getNovelData(id)) loaded.add(id);
    });
    return loaded;
  }, []);

  const novelData = useMemo(() => getNovelData(novelId) || fetchedNovels[novelId] || null, [novelId, fetchedNovels]);
  const chunks = novelData?.chunks || [];
  const meta = useMemo(() => getMetadata(), []);

  const handleSelectNovel = useCallback(async (id) => {
    setNovelId(id);
    setServerError(null);

    // Already available — pre-loaded or previously fetched
    if (getNovelData(id) || fetchedNovels[id]) return;

    // Fetch from server
    setLoadingNovelId(id);
    try {
      const resp = await fetch(`${SERVER_URL}/novel/${id}`);
      if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
      const data = await resp.json();
      window[`NOVEL_DATA_${id}`] = data;
      setFetchedNovels(prev => ({ ...prev, [id]: data }));
    } catch (err) {
      const offline = err.message.includes("Failed to fetch") || err.message.includes("NetworkError") || err.name === "TypeError";
      setServerError(offline ? "server_offline" : err.message);
    } finally {
      setLoadingNovelId(null);
    }
  }, [fetchedNovels]);

  const navigateTo = useCallback(({ view: v, novelId: nid, k, clusterId, chunkPos }) => {
    if (v !== undefined) setView(v);
    if (k !== undefined) setExplorerK(k);
    setFocusClusterId(clusterId !== undefined ? clusterId : null);
    setTargetChunkPos(chunkPos !== undefined ? chunkPos : null);
    if (nid !== undefined) handleSelectNovel(nid);
  }, [handleSelectNovel]);

  return (
    <div style={{
      minHeight: "100vh",
      backgroundColor: "#12131a",
      color: "#c8cdd8",
      fontFamily: "'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif",
      padding: "0",
    }}>
      <style>{`@keyframes explainPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } } .explain-pulse { animation: explainPulse 1.5s infinite; }`}</style>
      {/* Header */}
      <div style={{
        padding: "28px 32px 20px",
        borderBottom: "1px solid rgba(255,255,255,0.04)",
        background: "linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%)",
      }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: "16px", marginBottom: "6px" }}>
          <h1 style={{
            margin: 0, fontSize: "22px", fontWeight: 600,
            color: "#e8ecf4", letterSpacing: "-0.3px",
          }}>
            PAM Concept Discovery
          </h1>
          <span style={{
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
            fontSize: "12px", color: "#4a5468",
            padding: "2px 8px", borderRadius: "3px",
            border: "1px solid rgba(255,255,255,0.06)",
          }}>
            10K Gutenberg · {meta?.numBooks?.toLocaleString() || "9,766"} novels · {meta?.numChunks?.toLocaleString() || "24.96M"} chunks
          </span>
          <span
            onClick={() => setShowInfo(!showInfo)}
            style={{
              cursor: "pointer", fontSize: "14px", color: showInfo ? "#7c8aa0" : "#4a5468",
              transition: "color 0.15s", marginLeft: "4px",
            }}
            onMouseEnter={(e) => e.currentTarget.style.color = "#7c8aa0"}
            onMouseLeave={(e) => e.currentTarget.style.color = showInfo ? "#7c8aa0" : "#4a5468"}
            title="Server setup info"
          >{"\u24D8"}</span>
        </div>
        <p style={{
          margin: 0, fontSize: "13px", color: "#5a6478",
          maxWidth: "680px", lineHeight: "1.5",
        }}>
          Predictive Associative Memory trained on {meta?.numBooks?.toLocaleString() || "10,000"} Project Gutenberg novels.
          Clusters represent cross-author narrative functions discovered through temporal co-occurrence.
        </p>
      </div>

      {/* Info panel */}
      {showInfo && (
        <div style={{
          padding: "16px 32px",
          backgroundColor: "rgba(255,255,255,0.02)",
          borderBottom: "1px solid rgba(255,255,255,0.06)",
        }}>
          <div style={{
            fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
            fontSize: "12px", color: "#7c8aa0", lineHeight: "2",
          }}>
            <div style={{ color: "#8892a4", marginBottom: "4px", fontWeight: 500 }}>
              Full corpus access (9,766 novels)
            </div>
            <div style={{ color: "#5a6478" }}>
              Start the local server to browse any novel in the training corpus:
            </div>
            <div style={{
              padding: "8px 14px", margin: "6px 0", borderRadius: "4px",
              backgroundColor: "rgba(0,0,0,0.3)",
              border: "1px solid rgba(255,255,255,0.06)",
              color: "#c8cdd8",
            }}>
              cd pam_10k && python serve_novels.py --port 8080
            </div>
            <div style={{ color: "#5a6478", fontSize: "12px" }}>
              Requires numpy. Loads ~1.5 GB of cluster labels on startup. Search for any novel in the dropdown.
            </div>
          </div>
        </div>
      )}

      {/* Navigation */}
      <div style={{
        display: "flex", alignItems: "center", gap: "0",
        padding: "0 32px",
        borderBottom: "1px solid rgba(255,255,255,0.04)",
        backgroundColor: "rgba(255,255,255,0.01)",
      }}>
        {[
          { id: "timeline", label: "Narrative Timeline" },
          { id: "heldout", label: "Hierarchical View" },
          { id: "allnovels", label: "Cluster Explorer" },
          { id: "booklist", label: "Book List" },
        ].map((tab) => (
          <button
            key={tab.id}
            onClick={() => setView(tab.id)}
            style={{
              padding: "14px 20px", border: "none",
              borderBottom: view === tab.id ? "2px solid #7c8aa0" : "2px solid transparent",
              backgroundColor: "transparent",
              color: view === tab.id ? "#e8ecf4" : "#5a6478",
              fontSize: "13px", fontWeight: view === tab.id ? 500 : 400,
              cursor: "pointer", transition: "all 0.15s",
            }}
          >
            {tab.label}
          </button>
        ))}

        {/* Novel selector — dropdown for timeline and heldout views */}
        {(view === "timeline" || view === "heldout") && (
          <NovelSelector
            novelId={novelId}
            onSelect={handleSelectNovel}
            loadedNovels={loadedNovels}
            loadingNovelId={loadingNovelId}
            uploadedNovels={uploadedNovels}
          />
        )}
      </div>

      {/* Content */}
      <div style={{ padding: "24px 32px 48px" }}>
        {/* Novel header for timeline/heldout */}
        {(view === "timeline" || view === "heldout") && novelData && (
          <div style={{
            display: "flex", alignItems: "baseline", gap: "12px",
            marginBottom: "20px",
          }}>
            <h2 style={{
              margin: 0, fontSize: "18px", fontWeight: 500, color: "#c8cdd8",
              fontFamily: "'Crimson Pro', Georgia, serif", fontStyle: "italic",
            }}>
              {novelData.title}
            </h2>
            <span style={{ fontSize: "13px", color: "#5a6478" }}>
              {novelData.author}
            </span>
            <span style={{
              fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
              fontSize: "12px", color: "#4a5468",
            }}>
              {novelData.isUpload ? "" : `Gutenberg #${novelId} · `}{chunks.length} chunks
            </span>
            <span style={{
              fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
              fontSize: "11px",
              padding: "2px 8px", borderRadius: "3px",
              backgroundColor: novelData.isUpload
                ? "rgba(130, 120, 200, 0.15)"
                : novelData.inTraining
                  ? "rgba(109, 186, 109, 0.15)"
                  : "rgba(180, 140, 80, 0.15)",
              color: novelData.isUpload ? "#9088cc"
                : novelData.inTraining ? "#6dba6d" : "#b48c50",
              border: novelData.isUpload
                ? "1px solid rgba(130, 120, 200, 0.3)"
                : novelData.inTraining
                  ? "1px solid rgba(109, 186, 109, 0.3)"
                  : "1px solid rgba(180, 140, 80, 0.3)",
            }}>
              {novelData.isUpload ? "your upload" : novelData.inTraining ? "in training" : "held out"}
            </span>
          </div>
        )}

        {(view === "timeline" || view === "heldout") && loadingNovelId && (
          <div style={{
            padding: "64px", textAlign: "center",
            display: "flex", flexDirection: "column", alignItems: "center", gap: "16px",
          }}>
            <span className="explain-pulse" style={{ fontSize: "24px", color: "#5a6478" }}>{"\u25CF"}</span>
            <span style={{ fontSize: "13px", color: "#5a6478" }}>
              Loading novel from server...
            </span>
          </div>
        )}

        {(view === "timeline" || view === "heldout") && !novelData && !loadingNovelId && serverError && (
          <div style={{
            padding: "48px", textAlign: "center", maxWidth: "480px", margin: "0 auto",
          }}>
            {serverError === "server_offline" ? (
              <>
                <div style={{ fontSize: "14px", color: "#b48c50", marginBottom: "16px" }}>
                  Local server not running
                </div>
                <div style={{
                  fontSize: "12px", color: "#5a6478", lineHeight: "1.8",
                  fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
                  textAlign: "left", padding: "16px 20px", borderRadius: "6px",
                  backgroundColor: "rgba(255,255,255,0.02)",
                  border: "1px solid rgba(255,255,255,0.06)",
                }}>
                  <div style={{ color: "#7c8aa0", marginBottom: "8px" }}>To browse all 9,766 novels, start the server:</div>
                  <div style={{ color: "#c8cdd8" }}>cd pam_10k</div>
                  <div style={{ color: "#c8cdd8" }}>python serve_novels.py --port 8080</div>
                </div>
              </>
            ) : (
              <div style={{ fontSize: "13px", color: "#b48c50" }}>
                Error loading novel: {serverError}
              </div>
            )}
          </div>
        )}

        {(view === "timeline" || view === "heldout") && !novelData && !loadingNovelId && !serverError && (
          <div style={{
            padding: "48px", textAlign: "center", color: "#5a6478",
            fontSize: "14px",
          }}>
            No data loaded for this novel. Include the corresponding data file.
          </div>
        )}

        {view === "timeline" && chunks.length > 0 && (
          <NarrativeTimeline novelId={novelId} chunks={chunks} navigateTo={navigateTo}
            targetChunkPos={targetChunkPos} onClearTarget={() => setTargetChunkPos(null)} />
        )}
        {view === "heldout" && chunks.length > 0 && (
          <HeldOutNovel novelId={novelId} chunks={chunks} navigateTo={navigateTo} />
        )}
        {view === "allnovels" && (
          <ClusterExplorer
            selectedK={explorerK}
            onChangeK={setExplorerK}
            focusClusterId={focusClusterId}
            onClearFocus={clearFocus}
            navigateTo={navigateTo}
          />
        )}
        {view === "booklist" && (
          <BookList navigateTo={navigateTo} onAnalysisComplete={handleAnalysisComplete} />
        )}
      </div>

      {/* Footer */}
      <div style={{
        padding: "16px 32px",
        borderTop: "1px solid rgba(255,255,255,0.04)",
        fontFamily: "'JetBrains Mono', 'Fira Code', monospace",
        fontSize: "11px", color: "#3a4458",
        display: "flex", justifyContent: "space-between",
      }}>
        <span>Eridos AI · PAM 10K · {meta?.modelParams || "29.4M"} params · {meta?.architecture || "8L/2048h"} · epoch {meta?.epoch || 150} · {meta?.accuracy || 42.75}% accuracy</span>
        <span>Explanations generated by Claude Sonnet 4.5. Provided by Eridos AI.</span>
      </div>
    </div>
  );
}

const loading = document.getElementById("loading");
if (loading) loading.style.display = "none";
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(PAM10KDemo));
  </script>
</body>
</html>
